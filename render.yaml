services:
  - type: web
    name: slabiq
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: PSA_API_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PSA_EMAIL
        sync: false
      - key: PSA_PASSWORD
        sync: false
